<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Сайт заблокирован — Flowora</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f12;
      color: #f4f4f5;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }
    h1 { font-size: 28px; margin-bottom: 8px; }
    p { color: #a1a1aa; max-width: 420px; line-height: 1.5; }
    #countdown {
      font-size: 48px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      margin: 24px 0;
      color: #a78bfa;
    }
    button {
      margin-top: 32px;
      padding: 10px 20px;
      border-radius: 999px;
      border: 1px solid #3f3f46;
      background: transparent;
      color: #a1a1aa;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover { border-color: #71717a; color: #f4f4f5; }
  </style>
</head>
<body>
  <h1>🎯 Сейчас время фокуса</h1>
  <p>Этот сайт временно заблокирован, чтобы помочь вам сосредоточиться. Он снова станет доступен по окончании фокус-сессии.</p>
  <div id="countdown">--:--</div>
  <p style="font-size:12px;">Осталось до конца сессии</p>
  <button id="skip-btn">Пропустить блокировку на 5 минут</button>
  <script src="blocked.js"></script>
</body>
</html>
